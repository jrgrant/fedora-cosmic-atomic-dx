name: Build and Publish atomic-cosmic

on:
  # TODO: re-enable schedule + push when local build passes
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: fedora-cosmic-atomic-dx
  REGISTRY: ghcr.io
  FEDORA_VERSION: "44"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Pull base image (cached)
        run: |
          podman pull quay.io/fedora-ostree-desktops/cosmic-atomic:${{ env.FEDORA_VERSION }}

      - name: Build image
        run: |
          podman build --no-cache \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.FEDORA_VERSION }} \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.FEDORA_VERSION }}-$(date +%Y%m%d) \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Structural tests
        run: bats tests/bats/us*.bats

      - name: Build validation tests
        run: BUILD_TEST=1 bats tests/bats/build-validation.bats

      - name: Push to ghcr.io (main only)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          podman push ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.FEDORA_VERSION }}
          podman push ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.FEDORA_VERSION }}-$(date +%Y%m%d)
          podman push ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Sign with cosign (main only)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > /tmp/cosign.key
          cosign sign --key /tmp/cosign.key \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.FEDORA_VERSION }}-$(date +%Y%m%d)
          rm -f /tmp/cosign.key
